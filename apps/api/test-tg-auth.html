<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Auth Test Sandbox</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #eef2f3;
        margin: 0;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        text-align: center;
        width: 100%;
        max-width: 450px;
        box-sizing: border-box;
      }
      h2 {
        color: #333;
        margin-bottom: 5px;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
      }
      pre {
        background: #1e1e1e;
        color: #7ec699;
        padding: 15px;
        border-radius: 6px;
        text-align: left;
        overflow-x: auto;
        font-size: 13px;
        max-height: 250px;
      }
      .success-title {
        color: #2ecc71;
        margin-top: 15px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Telegram Authentication</h2>
      <p>Click below to securely sign in via Telegram</p>

      <script
        async
        src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="uurl_uz_oauth_bot"
        data-size="large"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write phone"
      ></script>

      <div id="result-box" style="display: none; margin-top: 25px">
        <div id="status-message" class="success-title">
          Processing handshake...
        </div>
        <pre id="jwt-output"></pre>
      </div>
    </div>

    <script>
      // This callback triggers automatically when the user approves via Telegram
      function onTelegramAuth(user) {
        console.log('Telegram client payload verified:', user);

        const resultBox = document.getElementById('result-box');
        const statusMsg = document.getElementById('status-message');
        const jwtOutput = document.getElementById('jwt-output');

        resultBox.style.display = 'block';
        jwtOutput.innerText = JSON.stringify(user, null, 2);

        // Forward the raw cryptographic signature to your local NestJS backend
        fetch('http://localhost:8080/api/v1/telegram/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user),
        })
          .then(async (response) => {
            const data = await response.json();
            if (!response.ok)
              throw new Error(data.message || 'Verification rejected');
            return data;
          })
          .then((data) => {
            statusMsg.innerText = '🚀 NestJS Authenticated Successfully!';
            statusMsg.style.color = '#2ecc71';
            jwtOutput.innerText = JSON.stringify(data, null, 2);

            // You can now commit this JWT token to localStorage
            // localStorage.setItem('token', data.access_token);
          })
          .catch((error) => {
            statusMsg.innerText = '❌ Backend Authentication Failed';
            statusMsg.style.color = '#e74c3c';
            jwtOutput.innerText = error.message;
            console.error('Auth routing failure:', error);
          });
      }
    </script>
  </body>
</html>
